services:
  netconfig:
    build: .
    container_name: netconfig-app
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////app/instance/netconfig.db
      - REDIS_URL=redis://localhost:6379/0
    volumes:
      - app_data:/app/instance
      - app_logs:/app/logs
      - app_backups:/app/backups
    network_mode: "host"
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 512M, cpus: '1.0' }

  redis:
    image: redis:7-alpine
    container_name: netconfig-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    network_mode: "host"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits: { memory: 128M }

volumes:
  app_data:
  app_logs:
  app_backups:
  redis_data:
